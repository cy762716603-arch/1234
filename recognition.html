<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI 자세 인식 화면</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:Arial,sans-serif;
    background:linear-gradient(180deg,#3b2848,#2b2435);
    color:white;
    min-height:100vh;
}

/* ===== NAV ===== */

nav{
    width:100%;
    height:70px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:70px;

    border-bottom:1px solid rgba(255,255,255,0.1);
}

nav a{
    color:white;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
}

nav a:hover{
    color:#df766d;
}

/* ===== MAIN ===== */

.main{
    width:100%;
    text-align:center;
    padding:80px 20px 100px;
}

.main h1{
    font-size:46px;
    margin-bottom:18px;
}

.subtitle{
    color:#d1c8db;
    font-size:18px;
    margin-bottom:50px;
}

/* ===== CAMERA ===== */

.camera-box{

    width:760px;
    height:480px;

    margin:0 auto;

    background:#f3f3f5;

    border:2px solid #df766d;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

canvas{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* ===== BUTTON ===== */

.button-area{

    margin-top:30px;

    display:flex;
    justify-content:center;
    gap:15px;
}

button{

    border:none;

    padding:13px 28px;

    color:white;

    cursor:pointer;

    font-size:15px;

    font-weight:bold;
}

.start-btn{
    background:#df766d;
}

.reset-btn{
    background:#222;
}

/* ===== STATUS ===== */

.status-area{

    margin:30px auto 0;

    width:760px;
    max-width:90%;

    background:#f3f3f5;

    color:#333;

    padding:25px;

    text-align:center;

    border:2px solid #df766d;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

.status-title{

    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

#current-state{

    color:#df766d;

    font-size:40px;

    font-weight:bold;
}

#label-container{

    margin-top:20px;

    color:#777;

    line-height:1.8;

    font-size:14px;
}

/* ===== RECORD ===== */

.record-section{

    width:100%;

    text-align:center;

    margin-top:80px;

    padding-bottom:80px;

    scroll-margin-top:80px;
}

.record-section h2{

    font-size:42px;

    margin-bottom:20px;
}

.record-section p{

    color:#d1c8db;

    font-size:18px;
}

.record-cards{

    margin-top:45px;

    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
}

.card{

    width:330px;
    height:110px;

    background:#f3f3f5;

    text-align:left;

    padding:25px;

    color:#333;

    border:2px solid #df766d;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

.card-number{

    font-size:32px;

    color:#df766d;

    font-weight:bold;
}

.card-label{

    margin-top:6px;

    color:#777;
}

/* ===== LOG ===== */

.log-box{

    width:600px;
    max-width:90%;

    margin:35px auto 0;

    background:#f3f3f5;

    color:#777;

    padding:18px;

    text-align:left;

    border:2px solid #df766d;

    box-shadow:
    0 15px 40px rgba(0,0,0,0.25);
}

/* ===== MOBILE ===== */

@media(max-width:900px){

    nav{
        gap:25px;
    }

    .main h1{
        font-size:36px;
    }

    .camera-box{

        width:92%;

        height:auto;

        aspect-ratio:16/10;
    }

    .button-area{

        flex-direction:column;

        align-items:center;
    }

    button{
        width:220px;
    }

}

</style>
</head>

<body>

<!-- ===== NAV ===== -->

<nav>

    <a href="index.html">
        프로젝트 소개
    </a >

    <a href="./recognition.html">
        AI 인식 화면
    </a >

    <a href="#record">
        횟수 기록
    </a >

</nav>

<!-- ===== MAIN ===== -->

<div class="main">

    <h1>
        AI 자세 인식 화면
    </h1>

    <div class="subtitle">

        카메라 권한을 허용한 뒤
        시작 버튼을 누르면
        AI가 실시간으로 자세를 분석합니다.

    </div>

    <!-- CAMERA -->

    <div class="camera-box">

        <canvas id="canvas"></canvas>

    </div>

    <!-- BUTTON -->

    <div class="button-area">

        <button
        class="start-btn"
        onclick="init()">

            카메라 시작

        </button>

        <button
        class="reset-btn"
        onclick="resetCount()">

            기록 초기화

        </button>

    </div>

    <!-- STATUS -->

    <div class="status-area">

        <div class="status-title">
            현재 인식 결과
        </div>

        <div id="current-state">
            대기 중
        </div>

        <div id="label-container">
            모델 실행 준비 완료
        </div>

    </div>

</div>

<!-- ===== RECORD ===== -->

<div
class="record-section"
id="record">

    <h2>
        올바른 팔굽혀펴기 횟수 기록
    </h2>

    <p>
        up → down → up 흐름이 감지되면
        1회로 기록됩니다.
    </p >

    <div class="record-cards">

        <!-- COUNT -->

        <div class="card">

            <div
            class="card-number"
            id="count">

                0

            </div>

            <div class="card-label">
                성공 횟수
            </div>

        </div>

        <!-- LAST POSE -->

        <div class="card">

            <div
            class="card-number"
            id="last-pose">

                -

            </div>

            <div class="card-label">
                최근 자세
            </div>

        </div>

        <!-- LAST TIME -->

        <div class="card">

            <div
            class="card-number"
            id="last-time">

                -

            </div>

            <div class="card-label">
                최근 기록 시간
            </div>

        </div>

    </div>

    <!-- LOG -->

    <div
    class="log-box"
    id="record-log">

        아직 기록이 없습니다.

    </div>

</div>

<script>

const URL = "./model/";

let model,
webcam,
ctx,
labelContainer,
maxPredictions;

let count = 0;

let lastState = "none";

let lastTime = 0;

let started = false;

/* ===== INIT ===== */

async function init(){

    if(started) return;

    try{

        started = true;

        document.getElementById(
        "current-state"
        ).innerText =
        "모델 로딩 중";

        model =
        await tmPose.load(
        URL + "model.json",
        URL + "metadata.json"
        );

        maxPredictions =
        model.getTotalClasses();

        webcam =
        new tmPose.Webcam(
        500,
        500,
        true
        );

        document.getElementById(
        "current-state"
        ).innerText =
        "카메라 권한 요청 중";

        await webcam.setup();

        await webcam.play();

        const canvas =
        document.getElementById(
        "canvas"
        );

        canvas.width = 500;
        canvas.height = 500;

        ctx =
        canvas.getContext("2d");

        labelContainer =
        document.getElementById(
        "label-container"
        );

        labelContainer.innerHTML = "";

        for(
            let i = 0;
            i < maxPredictions;
            i++
        ){

            labelContainer.appendChild(
                document.createElement("div")
            );
        }

        document.getElementById(
        "current-state"
        ).innerText =
        "인식 중";

        window.requestAnimationFrame(
        loop
        );

    }catch(error){

        started = false;

        console.error(error);

        document.getElementById(
        "current-state"
        ).innerText =
        "카메라 오류";

        document.getElementById(
        "label-container"
        ).innerHTML =

        `
        브라우저 카메라 권한을 허용하세요.<br>
        반드시 Live Server로 실행하세요.
        `;
    }
}

/* ===== LOOP ===== */

async function loop(){

    webcam.update();

    await predict();

    window.requestAnimationFrame(
    loop
    );
}

/* ===== PREDICT ===== */

async function predict(){

    const {
        pose,
        posenetOutput
    } =

    await model.estimatePose(
    webcam.canvas
    );

    const prediction =
    await model.predict(
    posenetOutput
    );

    let up = 0;
    let down = 0;

    let bestClass = "";

    let bestProb = 0;

    for(
        let i = 0;
        i < maxPredictions;
        i++
    ){

        const p =
        prediction[i];

        labelContainer.childNodes[i]
        .innerHTML =

        p.className +
        " : " +
        p.probability.toFixed(2);

        if(
            p.probability >
            bestProb
        ){

            bestProb =
            p.probability;

            bestClass =
            p.className;
        }

        const name =
        p.className
        .toLowerCase()
        .replace(/\s/g,"");

        if(name === "up")
            up = p.probability;

        if(name === "down")
            down = p.probability;
    }

    document.getElementById(
    "current-state"
    ).innerText =

    bestClass || "대기 중";

    document.getElementById(
    "last-pose"
    ).innerText =

    bestClass || "-";

    const now = Date.now();

    if(down > 0.75){

        lastState = "down";
    }

    if(

        up > 0.75 &&

        lastState === "down" &&

        now - lastTime > 500

    ){

        count++;

        document.getElementById(
        "count"
        ).innerText =
        count;

        lastState = "up";

        lastTime = now;

        const timeText =
        new Date()
        .toLocaleTimeString();

        document.getElementById(
        "last-time"
        ).innerText =
        timeText;

        document.getElementById(
        "record-log"
        ).innerText =

        count +
        "회 기록됨 / 시간 : " +
        timeText;
    }

    drawPose(pose);
}

/* ===== DRAW ===== */

function drawPose(pose){

    ctx.drawImage(
    webcam.canvas,
    0,
    0
    );

    if(pose){

        tmPose.drawKeypoints(
        pose.keypoints,
        0.5,
        ctx
        );

        tmPose.drawSkeleton(
        pose.keypoints,
        0.5,
        ctx
        );
    }
}

/* ===== RESET ===== */

function resetCount(){

    count = 0;

    lastState = "none";

    lastTime = 0;

    document.getElementById(
    "count"
    ).innerText = "0";

    document.getElementById(
    "last-pose"
    ).innerText = "-";

    document.getElementById(
    "last-time"
    ).innerText = "-";

    document.getElementById(
    "record-log"
    ).innerText =

    "아직 기록이 없습니다.";

    document.getElementById(
    "current-state"
    ).innerText =
    "대기 중";
}

</script>

</body>
</html>
